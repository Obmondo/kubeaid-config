apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  labels:
    kubeaid.io/version: 31.1.1
    kubeaid.io/managed-by: kubeaid
    kubeaid.io/sync-order: "100"
  name: postsync-metric-test
  namespace: argocd
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: postsync-test
  project: kubeaid
  source:
    path: k8s/mytestcluster7/postsync-metric-test
    repoURL: git@github.com:Obmondo/kubeaid-config.git
    targetRevision: HEAD
    directory:
      recurse: true
  syncPolicy:
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=true
      - ServerSideApply=true
