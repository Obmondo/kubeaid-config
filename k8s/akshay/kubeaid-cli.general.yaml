git:
  sshUsername: git
  useSSHAgent: true

forkURLs:
  kubeaid:
    url: https://github.com/Obmondo/KubeAid.git
    version: 31.1.1
  kubeaidConfig:
    url: git@github.com:Obmondo/kubeaid-config.git
    directory: 

cluster:
  type: workload
  name: akshay
  k8sVersion: v1.34.9
  enableAuditLogging: false
  apiServer:
    extraArgs: {}
    extraVolumes: []
    files: []
  netbird:
    dnsZone: akshay.local.io
  argoCD:
    deployKeys:
      kubeaidConfig:
        privateKeyFilePath: /home/deepak/test/k8s/private.key

kubePrometheus:
  version: v0.18.0

cloud:
  bare-metal:
    ssh:
      port: 22
    controlPlane:
      endpoint:
        host: 192.168.1.19
        port: 6443
      hosts:
        - publicAddress: 192.168.1.19


