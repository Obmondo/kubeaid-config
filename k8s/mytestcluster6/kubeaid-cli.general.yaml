git:
  sshUsername: git
  useSSHAgent: true


forkURLs:
  kubeaid:
    url: https://github.com/Obmondo/KubeAid.git
    version: 31.1.1
  kubeaidConfig:
    url: git@github.com:Obmondo/kubeaid-config.git
    directory:

cluster:
  type: workload
  name: mytestcluster6
  k8sVersion: v1.35.6
  enableAuditLogging: false
  apiServer:
    extraArgs: {}
    extraVolumes: []
    files: []
    # Optional. Set cluster.apiServer.oidc to enable OIDC on
    # kube-apiserver. Issuer URL is probed at bootstrap.
    #
    # oidc:
    #   issuerUrl: https://keycloak.example/realms/clusters
    #   clientId:  kubernetes-mytestcluster5
  netbird:
    dnsZone: netbird.vpn.obmondo.com
  argoCD:
    deployKeys:
      kubeaidConfig:
        privateKeyFilePath: /home/shubham/.ssh/id_rsa

kubePrometheus:
  version: v0.17.0

cloud:
  local: {}


